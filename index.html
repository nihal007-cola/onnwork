    .box {

    a {

      text-decoration: none;

    #transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      z-index: 9999;
      opacity: 0;
      pointer-events: none;

    }
    
    /* Header row: back button left, title center? No - back button left, contact buttons right */

<!-- SIGNAL CONSOLE OPTION REMOVED as requested -->

<div id="transition"></div>

<script>
// MATRIX BACKGROUND - enhanced glow and density
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const letters = "01";
const fontSize = 14;
let columns = Math.floor(canvas.width / fontSize);
let drops = [];

for (let x = 0; x < columns; x++) {
  drops[x] = Math.random() * canvas.height;
}

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#33ff99";
  ctx.shadowColor = "#33ff99";
  ctx.shadowBlur = 4;
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i]);

    if (drops[i] > canvas.height && Math.random() > 0.98) {
      drops[i] = 0;
    }

    drops[i] += 0.7;
  }
  
  ctx.shadowBlur = 0;
}

setInterval(draw, 55);

// TRANSITION for all links
const links = document.querySelectorAll("a");

links.forEach(link => {
  link.addEventListener("click", function(e) {
    // Only handle internal navigation links (no external links like whatsapp, tel, mailto)
    if (this.href && this.target !== "_blank") {
      const href = this.getAttribute('href');
      // Skip external protocols
      if (href && (href.startsWith('http') || href.startsWith('https') || 
          href.startsWith('mailto') || href.startsWith('tel') || href.includes('wa.me'))) {
        return; // let external links open normally
      }
      e.preventDefault();
      const overlay = document.getElementById("transition");
      overlay.classList.add("active");

      setTimeout(() => {
        window.location.href = this.href;
      }, 300);
    }
  });
});
</script>
