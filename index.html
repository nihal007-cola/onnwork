<!DOCTYPE html>
<html>
<head>
  <title>OFFICES OF NAWNIT NIHAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #33ff99;
      font-family: monospace;
      overflow-x: hidden;
      overflow-y: auto;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 30px;
      max-width: 800px;
      margin: 20px auto;

      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(0, 255, 100, 0.2);
      box-shadow: 0 0 25px rgba(0, 255, 100, 0.15);
      backdrop-filter: blur(6px);
    }

    .logo {
      width: 140px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      text-shadow: 0 0 8px rgba(0, 255, 100, 0.5);
    }

    .terminal p {
      margin: 4px 0;
      text-shadow: 0 0 5px rgba(0, 255, 100, 0.4);
      font-size: 14px;
    }

    .section-title {
      margin-top: 20px;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin: 15px 0;
    }

    .icon-box {
      flex: 1;
      border: 2px solid #33ff99;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .icon-box:hover {
      background: #33ff99;
      color: black;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      border: 1px solid #33ff99;
      padding: 12px;
      text-align: center;
      text-decoration: none;
      color: #33ff99;
      transition: 0.2s;
    }

    .btn:hover {
      background: #33ff99;
      color: black;
    }

    .highlight {
      background: #00bcd4;
      color: black;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .grid {
        flex-direction: column;
      }

      .logo {
        width: 110px;
      }
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <!-- TERMINAL TEXT -->
  <div class="terminal">
    <p>> booting onnwork lab...</p>
    <p>> systems running...</p>
    <p>> location: kolkata</p>
    <p>> status: building</p>
  </div>

  <!-- CONTACT SECTION -->
  <div class="section-title">> MISS ME? GET IN TOUCH:</div>

  <div class="grid">
    <div class="icon-box">💬</div>
    <div class="icon-box">📞</div>
    <div class="icon-box">✉️</div>
  </div>

  <!-- CTA -->
  <div class="section-title">> OR EXPLORE:</div>

  <div class="buttons">
    <a class="btn highlight" href="#">STUFF I CAN MAKE FOR YOU</a>
    <a class="btn" href="#">THINGS I MIGHT DO FOR YOU</a>
    <a class="btn" href="#">NEED TOYS</a>
    <a class="btn" href="#">TERMS & CONDITIONS</a>
    <a class="btn" href="#">PRIVACY POLICY</a>
  </div>

</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ONNWORKLAB";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let x = 0; x < columns; x++) {
  drops[x] = 1;
}

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00aa55";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);
</script>

</body>
</html>
