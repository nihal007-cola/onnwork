<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>OFFICES OF NAWNIT NIHAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #33ff99;
      font-family: monospace;
      overflow-x: hidden;
      overflow-y: auto;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 20px;
      max-width: 800px;
      margin: 15px auto;

      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(0, 255, 100, 0.2);
      box-shadow: 0 0 25px rgba(0, 255, 100, 0.1);
      backdrop-filter: blur(4px);
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    /* existing terminal p style preserved */
    .terminal p {
      margin: 4px 0;
      font-size: 14px;
      text-shadow: 0 0 5px rgba(0,255,100,0.4);
    }

    /* FIXED HEIGHT terminal container - prevents layout shift */
    #dynamic-terminal {
      font-family: monospace;
      color: #33ff99;
      font-size: 14px;
      margin-bottom: 24px;
      background: transparent;
      text-shadow: 0 0 5px rgba(0,255,100,0.4);
      /* CRITICAL: Fixed height to reserve space BEFORE animation starts */
      min-height: 180px;
      height: 180px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .terminal-line {
      margin: 4px 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }

    /* Blinking class - toggles opacity for terminal effect */
    .blink-active {
      animation: terminalBlink 0.5s step-end infinite;
    }

    @keyframes terminalBlink {
      0%, 100% { opacity: 1; text-shadow: 0 0 5px #33ff99, 0 0 8px #33ff99; }
      50% { opacity: 0.2; text-shadow: none; }
    }

    .section-title {
      margin-top: 20px;
      font-size: 15px;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .icon-box {
      border: 2px solid #33ff99;
      padding: 18px;
      text-align: center;
      font-size: 24px;
      text-decoration: none;
      color: #33ff99;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .icon-box:hover {
      background: rgba(0, 255, 100, 0.15);
      box-shadow: 0 0 15px rgba(0,255,100,0.6);
    }

    .icon-box:active {
      transform: scale(0.95);
      box-shadow: 0 0 25px rgba(0,255,100,1);
    }

    .icon-box:nth-child(1) {
      border-color: #25D366;
      color: #25D366;
    }

    .icon-box:nth-child(1):hover {
      background: rgba(37, 211, 102, 0.15);
      box-shadow: 0 0 15px rgba(37,211,102,0.7);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      border: 1px solid #33ff99;
      padding: 14px;
      text-align: center;
      text-decoration: none;
      color: #33ff99;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: rgba(0, 255, 100, 0.15);
      box-shadow: 0 0 15px rgba(0,255,100,0.6);
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 25px rgba(0,255,100,1);
    }

    #transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #transition.active {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .logo {
        width: 100px;
      }
      #dynamic-terminal, .terminal-line {
        font-size: 12px;
      }
      #dynamic-terminal {
        min-height: 160px;
        height: 160px;
      }
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">

  <img src="logo.png" class="logo">

  <!-- FIXED HEIGHT terminal container - space reserved BEFORE animation -->
  <div id="dynamic-terminal"></div>

  <div class="section-title">> MISS ME? GET IN TOUCH:</div>

  <div class="grid">
    <a class="icon-box" href="https://wa.me/917044358282" target="_blank">💬</a>

    <a class="icon-box" href="mailto:onn@jamesmoriarty.in">✉️</a>
  </div>

  <div class="section-title">> OR EXPLORE:</div>

  <div class="buttons">
    <a class="btn" href="product.html">PRODUCTS</a>
    <a class="btn" href="services.html">SERVICES</a>

    <a class="btn" href="terms.html">TERMS & CONDITIONS</a>
    <a class="btn" href="privacy.html">PRIVACY POLICY</a>
  </div>

</div>

<div id="transition"></div>

<script>
// ==================== MATRIX BACKGROUND (unchanged) ====================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const letters = "01ONNWORKLAB";
const fontSize = 12;
let columns;
let drops;

function initMatrix() {
  columns = Math.floor(canvas.width / fontSize);
  drops = [];
  for (let x = 0; x < columns; x++) {
    drops[x] = 1;
  }
}

initMatrix();

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.03)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 35);

// PAGE TRANSITION SCRIPT (preserved exactly)
const links = document.querySelectorAll("a");

links.forEach(link => {
  link.addEventListener("click", function(e) {
    if (this.href && this.target !== "_blank") {
      e.preventDefault();
      const overlay = document.getElementById("transition");
      overlay.classList.add("active");

      setTimeout(() => {
        window.location.href = this.href;
      }, 300);
    }
  });
});

// ==================== TERMINAL ANIMATION - FIXED VERSION ====================
// No duplicate lines, fixed height, no layout shift, proper cleanup

const terminalContainer = document.getElementById("dynamic-terminal");

// Sequence lines exactly as required
const bootLines = [
  "booting onnwork lab...",
  "systems running...",
  "location: kolkata",
  "status: building"
];
const finalLineText = "MISS ME? GET IN TOUCH:";

// Global control variables
let currentTimeouts = [];
let blinkInterval = null;
let blinkLineElement = null;      // SINGLE reference to the blinking line
let isAnimating = false;
let shouldContinueLoop = true;

// Helper: random delay between min and max ms (for jitter)
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);

// Clear all scheduled timeouts
function clearAllTimeouts() {
  for (let id of currentTimeouts) {
    clearTimeout(id);
  }
  currentTimeouts = [];
}

// Stop blinking and clear interval
function stopBlinking() {
  if (blinkInterval) {
    clearInterval(blinkInterval);
    blinkInterval = null;
  }
  // Remove blink class from the stored element
  if (blinkLineElement) {
    blinkLineElement.classList.remove('blink-active');
  }
}

// Clear terminal container completely
function clearTerminalContainer() {
  if (terminalContainer) {
    terminalContainer.innerHTML = '';
  }
  blinkLineElement = null;
}

// Typewriter effect for a given line (adds to container)
// Returns promise that resolves when line is fully typed
function typeLineWithJitter(lineText, targetContainer) {
  return new Promise((resolve) => {
    const lineDiv = document.createElement('div');
    lineDiv.className = 'terminal-line';
    lineDiv.style.whiteSpace = 'pre-wrap';
    targetContainer.appendChild(lineDiv);
    
    let index = 0;
    let charTimeouts = [];
    
    function typeChar() {
      if (index < lineText.length) {
        lineDiv.textContent += lineText[index];
        index++;
        // Random jitter between 20ms and 120ms for realistic terminal feel
        const delay = rand(20, 120);
        const timeoutId = setTimeout(typeChar, delay);
        charTimeouts.push(timeoutId);
        currentTimeouts.push(timeoutId);
      } else {
        // Finished typing this line
        resolve();
      }
    }
    
    // Start typing
    const startId = setTimeout(typeChar, rand(15, 50));
    charTimeouts.push(startId);
    currentTimeouts.push(startId);
  });
}

// Add the final line ONLY ONCE and store reference
function addFinalLine(targetContainer) {
  // Remove any existing final line just in case (safety)
  if (blinkLineElement && blinkLineElement.parentNode) {
    blinkLineElement.remove();
  }
  // Create fresh line element
  const finalDiv = document.createElement('div');
  finalDiv.className = 'terminal-line';
  finalDiv.textContent = finalLineText;
  targetContainer.appendChild(finalDiv);
  blinkLineElement = finalDiv;
  return finalDiv;
}

// Apply blinking using setInterval on the same element (toggles class)
function startBlinkingOnElement(element, durationMs = 10000) {
  if (!element) return;
  
  // Remove any existing blink class first
  element.classList.remove('blink-active');
  
  // Force reflow to ensure animation restarts cleanly
  void element.offsetWidth;
  
  // Add blink class to start CSS animation
  element.classList.add('blink-active');
  
  // Set interval to also ensure class toggling works (backup, but CSS animation handles it)
  // However to be safe and meet requirement "use setInterval for blinking", we'll use setInterval
  // to toggle opacity directly as well, ensuring compatibility.
  // But we already have CSS animation; requirement says "use setInterval for blinking"
  // We'll implement both: CSS animation for smoothness, setInterval for explicit control and cleanup.
  
  // Clear any existing interval
  if (blinkInterval) {
    clearInterval(blinkInterval);
  }
  
  let isVisible = true;
  blinkInterval = setInterval(() => {
    if (element) {
      isVisible = !isVisible;
      // Toggle opacity directly (overrides CSS but works in parallel)
      element.style.opacity = isVisible ? '1' : '0.2';
    }
  }, 500);
  
  // Stop after durationMs and clean up
  const stopTimeout = setTimeout(() => {
    if (blinkInterval) {
      clearInterval(blinkInterval);
      blinkInterval = null;
    }
    if (element) {
      element.classList.remove('blink-active');
      element.style.opacity = ''; // reset to default
    }
  }, durationMs);
  
  currentTimeouts.push(stopTimeout);
}

// Main sequence runner: displays lines sequentially, final line once, blinks, clears, restarts
async function runTerminalSequence() {
  if (!terminalContainer || !shouldContinueLoop) return;
  
  // Prevent overlapping sequences
  if (isAnimating) return;
  isAnimating = true;
  
  // Cleanup before starting fresh
  stopBlinking();
  clearAllTimeouts();
  clearTerminalContainer();
  
  // Ensure container has fixed height (already set in CSS), no layout shift
  
  // 1. Display boot lines one by one with typewriter jitter
  for (let i = 0; i < bootLines.length; i++) {
    if (!shouldContinueLoop) break;
    await typeLineWithJitter(bootLines[i], terminalContainer);
    // Small natural delay after each line (random jitter)
    await new Promise(resolve => {
      const tid = setTimeout(resolve, rand(80, 200));
      currentTimeouts.push(tid);
    });
  }
  
  // Check if loop should continue
  if (!shouldContinueLoop) {
    isAnimating = false;
    return;
  }
  
  // 2. Add final line ONLY ONCE - store reference
  addFinalLine(terminalContainer);
  
  // 3. Start blinking on the SAME element for 10 seconds
  startBlinkingOnElement(blinkLineElement, 10000);
  
  // 4. Wait for 10 seconds (while blinking occurs)
  await new Promise(resolve => {
    const tid = setTimeout(resolve, 10000);
    currentTimeouts.push(tid);
  });
  
  // 5. After blinking ends, stop blink and clear terminal
  stopBlinking();
  clearTerminalContainer();
  
  // 6. Small pause before restarting (clean transition)
  await new Promise(resolve => {
    const tid = setTimeout(resolve, 150);
    currentTimeouts.push(tid);
  });
  
  // Reset animation flag and restart if loop is active
  isAnimating = false;
  
  if (shouldContinueLoop && terminalContainer) {
    // Recursive restart - infinite loop
    runTerminalSequence();
  }
}

// Start the infinite loop with proper cleanup on page unload
let sequenceStarted = false;

function startTerminalLoop() {
  if (sequenceStarted) return;
  sequenceStarted = true;
  shouldContinueLoop = true;
  runTerminalSequence().catch(e => console.warn(e));
}

// Handle page visibility and unload to prevent memory leaks
window.addEventListener('beforeunload', () => {
  shouldContinueLoop = false;
  stopBlinking();
  clearAllTimeouts();
  isAnimating = false;
});

// Optional: pause animation when page hidden to save resources, but not required
// Just ensure no leaks
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // Optionally slow down but not needed; we just avoid creating new cycles when hidden
    // but the loop continues; fine.
  }
});

// Start when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startTerminalLoop);
} else {
  startTerminalLoop();
}

// Additional safety: Ensure canvas position fixed is untouched. 
// No layout shift because #dynamic-terminal has fixed min-height/height.
// The final line is created only once per loop and reused via reference.
// Blinking uses setInterval toggling opacity, cleared properly.
// On each restart: terminal.innerHTML = "" clears everything, then rebuilds fresh.
// No duplicate lines because addFinalLine replaces/creates new element each loop,
// but within a single loop it's only added once. The previous reference is cleaned.
// Layout shift eliminated by fixed container height (180px) that reserves space before animation.
</script>

</body>
