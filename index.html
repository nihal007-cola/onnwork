<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>OFFICES OF NAWNIT NIHAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:black;
      color:#33ff99;
      font-family:'Courier New', monospace;
      overflow:hidden;
    }

    canvas {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
    }

    #matrix-bg { z-index:0; opacity:0.35; }
    #morph-layer { z-index:1; pointer-events:none; }

    /* HEADER */
    .header {
      position:fixed;
      top:0;
      width:100%;
      z-index:10;
      display:flex;
      justify-content:space-between;
      padding:15px 25px;
      background:rgba(0,0,0,0.8);
      border-bottom:1px solid #33ff99;
    }

    .logo { height:40px; }

    .links a {
      color:#33ff99;
      margin-left:10px;
      text-decoration:none;
      border:1px solid #33ff99;
      padding:6px 10px;
      border-radius:20px;
      transition:0.2s;
    }

    .links a:hover {
      background:#33ff99;
      color:black;
    }

    /* HERO WINDOW */
    .portal {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:85%;
      max-width:900px;
      padding:30px;
      border:1px solid #33ff99;
      border-radius:10px;
      backdrop-filter:blur(6px);
      background:rgba(0,0,0,0.6);
      z-index:5;
      cursor:pointer;
      transition:0.3s;
      overflow:hidden;
    }

    .portal:hover {
      box-shadow:0 0 30px #33ff99;
      transform:translate(-50%,-50%) scale(1.02);
    }

    .portal::before {
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(51,255,153,0.1), transparent);
      animation:scan 3s linear infinite;
    }

    @keyframes scan {
      0% { transform:translateX(-100%); }
      100% { transform:translateX(100%); }
    }

    .portal-title {
      font-size:28px;
      margin-bottom:10px;
      letter-spacing:2px;
    }

    .portal-sub {
      opacity:0.8;
      margin-bottom:20px;
    }

    .portal-grid {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .tag {
      border:1px solid #33ff99;
      padding:6px 10px;
      border-radius:20px;
      font-size:12px;
    }

    /* MATRIX → STMS TEXT */
    .morph-text {
      margin-top:20px;
      font-size:14px;
      line-height:1.5;
      opacity:0.9;
    }

    /* EXPLORE */
    .explore {
      position:absolute;
      bottom:30px;
      width:100%;
      text-align:center;
      z-index:5;
    }

    .explore a {
      display:block;
      margin:8px auto;
      width:260px;
      padding:12px;
      border:1px solid #33ff99;
      color:#33ff99;
      text-decoration:none;
      border-radius:6px;
      transition:0.2s;
    }

    .explore a:hover {
      background:rgba(0,255,100,0.15);
      transform:translateX(5px);
    }

  </style>
</head>

<body>

<canvas id="matrix-bg"></canvas>
<canvas id="morph-layer"></canvas>

<div class="header">
  <img src="logo.png" class="logo">
  <div class="links">
    <a href="https://wa.me/917044358282" target="_blank">CHAT</a>
    <a href="tel:+917044358282">CALL</a>
    <a href="mailto:onn@jamesmoriarty.in">MAIL</a>
  </div>
</div>

<!-- PORTAL -->
<a href="onnwork.html" class="portal">

  <div class="portal-title">ONNwork Automations</div>
  <div class="portal-sub">Control your business. In real time.</div>

  <div class="portal-grid">
    <div class="tag">ERP</div>
    <div class="tag">Inventory</div>
    <div class="tag">Production</div>
    <div class="tag">Automation</div>
  </div>

  <div class="morph-text" id="morphText"></div>

</a>

<!-- EXPLORE -->
<div class="explore">
  <a href="product.html">📦 PRODUCTS</a>
  <a href="services.html">🤝 SERVICES</a>
  <a href="toys.html">🎮 TOYS</a>
  <a href="terms.html">📜 TERMS</a>
</div>

<script>
/* MATRIX BACKGROUND */
const canvas = document.getElementById("matrix-bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ONNWORK";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({length:columns}).map(()=>Math.random()*-100);

function drawMatrix(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#33ff99";
  ctx.font=fontSize+"px monospace";

  drops.forEach((y,i)=>{
    const text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,y*fontSize);

    if(y*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });

  requestAnimationFrame(drawMatrix);
}
drawMatrix();

/* MORPH TEXT EFFECT (THIS IS THE MAGIC) */

const morphText = document.getElementById("morphText");

const phases = [
  ">> booting raw data stream...",
  ">> unstructured flow detected...",
  ">> mapping production variables...",
  ">> aligning inventory nodes...",
  ">> converting chaos → system...",
  ">> initializing ONNwork core...",
  ">> STMS READY"
];

let phaseIndex = 0;
let charIndex = 0;

function typeMorph() {
  if (phaseIndex >= phases.length) return;

  if (charIndex < phases[phaseIndex].length) {
    morphText.textContent += phases[phaseIndex][charIndex];
    charIndex++;
    setTimeout(typeMorph, 25);
  } else {
    morphText.textContent += "\n";
    phaseIndex++;
    charIndex = 0;
    setTimeout(typeMorph, 400);
  }
}

typeMorph();
</script>

</body>
</html>
