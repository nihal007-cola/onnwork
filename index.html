    body {

      font-family: 'Courier New', monospace;

    canvas#matrix-bg {

    canvas#translucent-overlay {

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.95);

      border-bottom: 1px solid #33ff99;

      display: flex;

      align-items: center;
    }

    .logo { height: 40px; }

    .header-right {

      gap: 12px;
    }

    .contact-icon {
      color: #33ff99;

      font-size: 20px;
      padding: 5px 10px;
      border: 1px solid #33ff99;
      border-radius: 30px;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 30px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    #dynamic-terminal {
      display: block;
      text-decoration: none;
      border: 1px solid rgba(51, 255, 153, 0.4);

      margin-bottom: 30px;
      background: rgba(2, 10, 6, 0.75);
      backdrop-filter: blur(12px);
    }

    .terminal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(51, 255, 153, 0.2);
    }

    .terminal-brand {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .terminal-logo { height: 32px; }

    .terminal-title { font-weight: 700; font-size: 22px; }

    .terminal-sub { font-size: 11px; opacity: 0.65; }

    .terminal-status {

      border: 1px solid #33ff99;
      padding: 6px 14px;
      border-radius: 30px;
    }

    .terminal-metrics {

      grid-template-columns: repeat(3, 1fr);
      gap: 12px;

    .metric-card {
      border: 1px solid rgba(51, 255, 153, 0.25);

    .metric-card .label { font-size: 10px; opacity: 0.5; }

      color: white;
      text-decoration: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff0033, #990000);
      box-shadow: 0 0 25px rgba(255, 0, 50, 0.4);

    }

    .onnwork-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 40px rgba(255, 0, 50, 0.7);
    }

    .terminal-footer {

      font-size: 14px;

    }

    .grid {

    .icon-box {
      border: 2px solid #33ff99;
      padding: 18px;
      font-size: 28px;
      border-radius: 60px;
      color: #33ff99;
      text-decoration: none;
    }

    .section-title {

      font-size: 18px;
      border-left: 3px solid #33ff99;
      padding-left: 12px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      border: 1px solid #33ff99;
      padding: 14px;
      text-align: center;
      text-decoration: none;
      color: #33ff99;
      border-radius: 8px;

<body>

<div class="content">

  <div id="dynamic-terminal">

    <div class="terminal-header">
      <div class="terminal-brand">

<script>
const canvas = document.getElementById("matrix-bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ONNWORK";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({length:columns}).map(()=>Math.random()*-100);

function drawMatrix(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#33ff99";
  ctx.font=fontSize+"px monospace";

  drops.forEach((y,i)=>{
    const text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,y*fontSize);
    if(y*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });

  requestAnimationFrame(drawMatrix);
}
drawMatrix();
</script>
