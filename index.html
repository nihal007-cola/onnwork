  <style>
    body {
      margin: 0;
      background: black;
      color: #33ff99;

    }

    canvas {

    .content {

      background: rgba(0, 0, 0, 0.45);

    .logo {

    }

    .terminal p {
      margin: 4px 0;

    }

    #dynamic-terminal {
      font-family: monospace;
      color: #33ff99;
      font-size: 14px;
      margin-bottom: 24px;
      background: transparent;
      text-shadow: 0 0 5px rgba(0,255,100,0.4);
      min-height: 180px;
      height: 180px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .terminal-line {
      margin: 4px 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }

    .blink-active {
      animation: terminalBlink 0.5s step-end infinite;
    }

    @keyframes terminalBlink {
      0%, 100% { opacity: 1; text-shadow: 0 0 5px #33ff99, 0 0 8px #33ff99; }
      50% { opacity: 0.2; text-shadow: none; }
    }

    .section-title {
      margin-top: 20px;
      font-size: 15px;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .icon-box {
      border: 2px solid #33ff99;
      padding: 18px;
      text-align: center;
      font-size: 24px;
      text-decoration: none;
      color: #33ff99;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .icon-box:hover {
      background: rgba(0, 255, 100, 0.15);
      box-shadow: 0 0 15px rgba(0,255,100,0.6);
    }

    .icon-box:active {
      transform: scale(0.95);
      box-shadow: 0 0 25px rgba(0,255,100,1);
    }

    .icon-box:nth-child(1) {
      border-color: #25D366;
      color: #25D366;
    }

    .icon-box:nth-child(1):hover {
      background: rgba(37, 211, 102, 0.15);
      box-shadow: 0 0 15px rgba(37,211,102,0.7);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      border: 1px solid #33ff99;
      padding: 14px;
      text-align: center;
      text-decoration: none;
      color: #33ff99;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: rgba(0, 255, 100, 0.15);
      box-shadow: 0 0 15px rgba(0,255,100,0.6);
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 25px rgba(0,255,100,1);
    }

    #transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #transition.active {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .logo {
        width: 100px;
      }
      #dynamic-terminal, .terminal-line {
        font-size: 12px;
      }
      #dynamic-terminal {
        min-height: 160px;
        height: 160px;
      }

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const letters = "01ONNWORKLAB";
const fontSize = 12;
let columns;
let drops;

function initMatrix() {
  columns = Math.floor(canvas.width / fontSize);
  drops = [];
  for (let x = 0; x < columns; x++) {
    drops[x] = 1;
  }
}
initMatrix();

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.03)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(draw, 35);

// TERMINAL
const terminalContainer = document.getElementById("dynamic-terminal");

const bootLines = [
  "booting onnwork lab...",
  "systems running...",
  "location: kolkata",
  "status: building"
];

// ✅ FIXED HERE
const finalLineText = "> MISS ME? GET IN TOUCH:";

let currentTimeouts = [];
let blinkInterval = null;
let blinkLineElement = null;

const rand = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);

function typeLine(line) {
  return new Promise(resolve => {
    const el = document.createElement("div");
    el.className = "terminal-line";
    terminalContainer.appendChild(el);

    let i = 0;
    function type() {
      if (i < line.length) {
        el.textContent += line[i++];
        setTimeout(type, rand(20, 80));
      } else resolve();
    }
    type();
  });
}

function run() {
  terminalContainer.innerHTML = "";

  (async () => {
    for (let l of bootLines) {
      await typeLine(l);
    }

    const final = document.createElement("div");
    final.className = "terminal-line blink-active";
    final.textContent = finalLineText;

    terminalContainer.appendChild(final);
  })();
}

run();
</script>
