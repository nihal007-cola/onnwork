    /* MATRIX TRANSITION */

<div id="transition"></div>

<script>
// ==================== MATRIX BACKGROUND (unchanged) ====================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const letters = "01ONNWORKLAB";
const fontSize = 12;
let columns;
let drops;

function initMatrix() {
  columns = Math.floor(canvas.width / fontSize);
  drops = [];
  for (let x = 0; x < columns; x++) {
    drops[x] = 1;
  }
}

initMatrix();

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.03)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 35);

// PAGE TRANSITION SCRIPT (preserved exactly)
const links = document.querySelectorAll("a");

links.forEach(link => {
  link.addEventListener("click", function(e) {
    if (this.href && this.target !== "_blank") {
      e.preventDefault();
      const overlay = document.getElementById("transition");
      overlay.classList.add("active");

      setTimeout(() => {
        window.location.href = this.href;
      }, 300);
    }
  });
});

// ==================== TERMINAL ANIMATION SEQUENCE (with infinite loop, typing jitter, blinking) ====================
// No external libraries. Clean async logic, mobile compatible, memory-safe.

const terminalContainer = document.getElementById("dynamic-terminal");

// Sequence lines exactly as required
const bootLines = [
  "booting onnwork lab...",
  "systems running...",
  "location: kolkata",
  "status: building"
];
const finalLine = "MISS ME? GET IN TOUCH:";

// For random jitter (realistic terminal feel) between 30ms and 180ms per character, but line-by-line delay with random jitter
// We'll implement a typewriter effect with random delays per character (jitter) for lines 1-4, 
// and final line appears instantly but then blinks for 10 seconds. However requirement: lines appear one by one,
// typewriter preferred but instant line-by-line acceptable. We'll implement a charming typewriter per character with jitter 
// to feel like real boot, but also ensure overall sequence timing is reliable.

// Helper: random delay between min and max ms
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);

// Global control variables to manage infinite loop & avoid overlapping sequences
let isRunning = false;
let currentTimeoutIds = [];

// Clear any pending timeouts to prevent memory leaks and overlapping loops
function clearPendingTimeouts() {
  for (let id of currentTimeoutIds) {
    clearTimeout(id);
  }
  currentTimeoutIds = [];
}

// Remove blink class from any element, stop blinking
function stopBlinking() {
  const blinkElement = document.querySelector('#dynamic-terminal .blink-line');
  if (blinkElement) {
    blinkElement.classList.remove('blink-line');
  }
}

// Clear terminal container fully
function clearTerminalDisplay() {
  if (terminalContainer) {
    terminalContainer.innerHTML = '';
  }
}

// Typewriter effect for a given text line, appended to terminal container with optional jitter per character
// Returns a promise that resolves when the entire line is typed.
function typeLineWithJitter(lineText, targetContainer) {
  return new Promise((resolve) => {
    const lineDiv = document.createElement('div');
    lineDiv.className = 'terminal-line';
    lineDiv.style.whiteSpace = 'pre-wrap';
    targetContainer.appendChild(lineDiv);
    
    let index = 0;
    let charTimeouts = [];
    
    function typeChar() {
      if (index < lineText.length) {
        lineDiv.textContent += lineText[index];
        index++;
        // Random jitter between 20ms and 120ms for realistic terminal feel
        const delay = rand(20, 120);
        const timeoutId = setTimeout(typeChar, delay);
        charTimeouts.push(timeoutId);
        currentTimeoutIds.push(timeoutId);
      } else {
        // Finished typing this line
        resolve();
      }
    }
    
    // Start typing first character
    const startId = setTimeout(typeChar, rand(15, 50));
    charTimeouts.push(startId);
    currentTimeoutIds.push(startId);
    
    // Store timeouts to optionally cancel if needed, but we'll not cancel mid-line unless reset.
    // To avoid memory leaks, we store but ensure they're cleared on sequence reset.
    lineDiv._timeouts = charTimeouts;
  });
}

// Instant line render (without typewriter jitter) but we will use typewriter for charm.
// Since requirement says typewriter preferred, we go with jitter-based typewriter.
// For final line, we'll add it instantly but add blink behavior.

// Add final line instantly (no typing animation)
function addFinalLine(targetContainer) {
  const finalDiv = document.createElement('div');
  finalDiv.className = 'terminal-line';
  finalDiv.textContent = finalLine;
  targetContainer.appendChild(finalDiv);
  return finalDiv;
}

// Blink the final line element for exactly 10 seconds, toggling visibility/opacity using CSS animation
// The CSS class .blink-line toggles opacity every 500ms. We'll apply class for 10 seconds then remove.
function blinkForTenSeconds(element) {
  if (!element) return;
  // Add blink class to trigger CSS animation
  element.classList.add('blink-line');
  
  // Stop blinking after exactly 10 seconds
  const stopBlinkTimeout = setTimeout(() => {
    if (element) {
      element.classList.remove('blink-line');
    }
  }, 10000);
  currentTimeoutIds.push(stopBlinkTimeout);
}

// Main sequence runner: displays lines one by one (typewriter each line with random jitter)
// After last boot line appears, show final line instantly, then blink final line for 10s.
// Then clear all and restart.
async function runTerminalSequence() {
  if (!terminalContainer) return;
  
  // Clear any ongoing timeouts and reset container
  clearPendingTimeouts();
  stopBlinking();
  clearTerminalDisplay();
  
  // 1. Display boot lines sequentially with typewriter jitter effect
  for (let i = 0; i < bootLines.length; i++) {
    await typeLineWithJitter(bootLines[i], terminalContainer);
    // small natural delay after each line to mimic terminal reading (extra 80-200ms)
    await new Promise(resolve => {
      const tid = setTimeout(resolve, rand(80, 200));
      currentTimeoutIds.push(tid);
    });
  }
  
  // 2. After boot lines, show the final line instantly
  const finalLineElement = addFinalLine(terminalContainer);
  
  // 3. Apply blinking to the final line for exactly 10 seconds
  blinkForTenSeconds(finalLineElement);
  
  // 4. Wait for 10 seconds (while blinking occurs)
  await new Promise(resolve => {
    const tid = setTimeout(resolve, 10000);
    currentTimeoutIds.push(tid);
  });
  
  // 5. After blink ends, clear entire terminal text
  clearTerminalDisplay();
  stopBlinking(); // extra safety
  
  // 6. Restart the infinite loop (but ensure no overlapping loops)
  // Check if we still want to loop (avoid restart if page is navigating or something)
  // Small delay before restart to feel natural
  await new Promise(resolve => {
    const tid = setTimeout(resolve, 200);
    currentTimeoutIds.push(tid);
  });
  
  // Only restart if the container still exists (avoid racing conditions)
  if (terminalContainer && !window._terminalDestroyed) {
    runTerminalSequence();
  }
}

// Global flag to prevent parallel sequences and safe infinite loop start
let sequenceStarted = false;

function startTerminalLoop() {
  if (sequenceStarted) return;
  sequenceStarted = true;
  window._terminalDestroyed = false;
  runTerminalSequence().catch(e => console.warn(e));
}

// Ensure that when page visibility changes or before unload, we don't cause leaks
// Also handle page refresh gracefully: cancel timeouts on page unload
window.addEventListener('beforeunload', () => {
  window._terminalDestroyed = true;
  clearPendingTimeouts();
  if (terminalContainer) {
    // optional clear display
  }
});

// Optional: If the page becomes hidden, we don't need to stop the animation but we keep it running; 
// but timeouts may cause minor performance, but fine. We'll also restart if needed after resume.
// Also support resize safety: no effect.

// Start sequence when DOM fully loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startTerminalLoop);
} else {
  startTerminalLoop();
}

// Additional note: The existing matrix background and links are untouched.
// The dynamic terminal replaces the static text but preserves spacing, glow, and styling.
// To ensure no conflict with any other DOM modifications, we removed the old static terminal lines 
// from HTML while keeping original class .section-title etc intact.
// The blinking only applies to the last line for 10 seconds, via CSS animation (opacity toggle).
// No external libraries used, all async/await and setTimeout with proper cleanup.
// Memory leaks avoided: clearPendingTimeouts() resets all timeouts before each new cycle.
// Mobile compatible: viewport, fonts scaled, uses relative units.

// Additionally, ensure that if the terminal container is ever removed (it won't be) we stop.
// Added jitter and sound? The requirement says "add typing sound effect or random delay jitter" -> we implemented random delay jitter per character and per line, realistic terminal boot.
// No external audio to avoid complexity and permissions, jitter accomplishes same aesthetic.
</script>

<!-- The original static terminal block has been removed to avoid duplication of lines. 
     Now we have dynamic animated terminal sequence that loops infinitely exactly as required:
     - Lines appear one by one with jitter/typewriter effect
     - Order: booting onnwork lab..., systems running..., location: kolkata, status: building
     - Then shows "MISS ME? GET IN TOUCH:" instantly
     - That line blinks (opacity toggles) for exactly 10 seconds using CSS keyframes
     - After 10 seconds, entire terminal text clears, sequence restarts from beginning
     - Maintains color #33ff99, monospace, glow, terminal aesthetic.
     - No breaking of existing layout, links, matrix canvas, or transition logic.
-->
</body>
