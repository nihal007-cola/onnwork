<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ONN LOGO ENGINE · TURTLE GRAPHICS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐢</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; color: #33ff99; font-family: 'Courier New', monospace; overflow-x: hidden; }
    canvas#matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.35; pointer-events: none; }
    .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid #33ff99; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .logo { height: 40px; width: auto; }
    .nav-links { display: flex; gap: 12px; }
    .nav-link { color: #33ff99; text-decoration: none; font-size: 14px; font-family: monospace; border: 1px solid #33ff99; padding: 5px 12px; border-radius: 20px; transition: all 0.2s ease; }
    .nav-link:hover { background: #33ff99; color: black; box-shadow: 0 0 10px #33ff99; }
    .header-right { display: flex; gap: 12px; }
    .contact-icon { color: #33ff99; text-decoration: none; font-size: 20px; padding: 5px 10px; border: 1px solid #33ff99; border-radius: 30px; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 5px; }
    .contact-icon span { font-size: 12px; }
    .contact-icon:hover { background: #33ff99; color: black; box-shadow: 0 0 10px #33ff99; }
    .app-container { position: relative; z-index: 2; display: flex; flex-direction: column; height: calc(100vh - 65px); padding: 12px; gap: 12px; }
    .main-panel { display: flex; flex: 1; gap: 12px; min-height: 0; }
    .console-panel { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.8); border: 2px solid #33ff99; border-radius: 12px; overflow: hidden; }
    .console-header { background: #051a0c; padding: 8px 12px; border-bottom: 1px solid #33ff99; font-weight: bold; font-size: 12px; }
    .console-history { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; }
    .line { border-left: 2px solid #33ff99; padding-left: 8px; margin-bottom: 5px; font-family: monospace; }
    .input-area { padding: 10px; border-top: 1px solid #33ff99; }
    #cmd { width: 100%; background: black; border: 1.5px solid #33ff99; padding: 10px; color: #33ff99; font-family: monospace; font-size: 13px; outline: none; border-radius: 6px; }
    #cmd:focus { box-shadow: 0 0 12px #33ff99; }
    .drawing-panel { flex: 2; display: flex; flex-direction: column; background: #030303; border: 2px solid #33ff99; border-radius: 12px; overflow: hidden; }
    .arena-header { background: #051a0c; padding: 6px 12px; border-bottom: 1px solid #33ff99; font-size: 12px; display: flex; justify-content: space-between; }
    .canvas-wrapper { flex: 1; position: relative; background: black; }
    canvas#turtleCanvas { width: 100%; height: 100%; display: block; background: black; cursor: crosshair; }
    .ref-panel { flex: 0.7; background: rgba(0,0,0,0.8); border: 1px solid #33ff99; border-radius: 12px; padding: 12px; overflow-y: auto; font-size: 11px; }
    .hint { margin-bottom: 8px; border-left: 2px solid #33ff99; padding-left: 8px; }
    .mobile-bar { display: none; background: black; border-top: 2px solid #33ff99; padding: 12px; flex-direction: column; gap: 10px; }
    .mobile-input-group { display: flex; gap: 10px; }
    .mobile-input { flex: 1; background: #0a0f0a; border: 2px solid #33ff99; color: #33ff99; font-family: monospace; font-size: 14px; padding: 10px; border-radius: 10px; outline: none; }
    .mobile-submit { background: #33ff99; color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
    .quick-cmds { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .quick-cmd { background: rgba(0,0,0,0.8); border: 1px solid #33ff99; color: #33ff99; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
    @media (max-width: 850px) {
      .main-panel { flex-direction: column; }
      .ref-panel { max-height: 100px; }
      .input-area { display: none; }
      .mobile-bar { display: flex; }
      .app-container { height: auto; min-height: 100vh; }
    }
  </style>
</head>
<body>
<canvas id="matrix-bg"></canvas>
<div class="sticky-header">
  <div class="header-left">
    <img src="logo.png" class="logo" alt="ONN Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'black\'/%3E%3Ctext x=\'50\' y=\'68\' font-size=\'48\' text-anchor=\'middle\' fill=\'%2333ff99\'%3EONN%3C/text%3E%3C/svg%3E'">
    <div class="nav-links">
      <a href="index.html" class="nav-link">HOME</a>
      <a href="toys.html" class="nav-link">← TOYS</a>
    </div>
  </div>
  <div class="header-right">
    <a href="https://wa.me/917044358282" target="_blank" class="contact-icon">💬 <span>CHAT</span></a>
    <a href="tel:+917044358282" class="contact-icon">📞 <span>CALL</span></a>
    <a href="mailto:onn@jamesmoriarty.in" class="contact-icon">✉️ <span>MAIL</span></a>
  </div>
</div>
<div class="app-container">
  <div class="main-panel">
    <div class="console-panel">
      <div class="console-header">🐢 TERMINAL :: COMMAND HISTORY</div>
      <div class="console-history" id="consoleHistory"></div>
      <div class="input-area">
        <input type="text" id="cmd" placeholder="fd 80 rt 90 repeat 4 [fd 100 rt 90]" spellcheck="false">
      </div>
    </div>
    <div class="drawing-panel">
      <div class="arena-header"><span>🎨 TURTLE CANVAS</span><span>PEN: <span id="penStatus">DOWN</span></span></div>
      <div class="canvas-wrapper"><canvas id="turtleCanvas"></canvas></div>
    </div>
    <div class="ref-panel">
      <div class="hint"><strong>fd 100</strong> → forward</div>
      <div class="hint"><strong>bk 50</strong> → backward</div>
      <div class="hint"><strong>rt 90</strong> → right turn</div>
      <div class="hint"><strong>lt 90</strong> → left turn</div>
      <div class="hint"><strong>pu/pd</strong> → pen up/down</div>
      <div class="hint"><strong>home</strong> → reset position</div>
      <div class="hint"><strong>clear</strong> → erase all</div>
      <div class="hint"><strong>repeat 4 [fd 80 rt 90]</strong> → loop</div>
    </div>
  </div>
  <div class="mobile-bar">
    <div class="mobile-input-group">
      <input type="text" id="mobileCommand" class="mobile-input" placeholder="fd 100, rt 90" spellcheck="false">
      <button class="mobile-submit" id="mobileSubmit">RUN</button>
    </div>
    <div class="quick-cmds">
      <button class="quick-cmd" data-cmd="fd 50">↑ FD 50</button>
      <button class="quick-cmd" data-cmd="bk 50">↓ BK 50</button>
      <button class="quick-cmd" data-cmd="rt 90">↻ RT 90</button>
      <button class="quick-cmd" data-cmd="lt 90">↺ LT 90</button>
      <button class="quick-cmd" data-cmd="pu">✏️ PU</button>
      <button class="quick-cmd" data-cmd="pd">✍️ PD</button>
      <button class="quick-cmd" data-cmd="home">🏠 HOME</button>
      <button class="quick-cmd" data-cmd="clear">🗑️ CLEAR</button>
    </div>
  </div>
</div>
<script>
  // MATRIX BG
  const bgCanvas = document.getElementById("matrix-bg");
  const bgCtx = bgCanvas.getContext("2d");
  function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
  resizeBg();
  window.addEventListener("resize", resizeBg);
  const bgLetters = "01ONNWORKLAB";
  const bgFontSize = 14;
  let bgColumns = Math.floor(bgCanvas.width / bgFontSize);
  let bgDrops = [];
  function initBg() {
    bgColumns = Math.floor(bgCanvas.width / bgFontSize);
    bgDrops = [];
    for (let x = 0; x < bgColumns; x++) bgDrops[x] = Math.random() * -100;
  }
  initBg();
  function drawBg() {
    bgCtx.fillStyle = "rgba(0, 0, 0, 0.04)";
    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
    bgCtx.fillStyle = "#33ff99";
    bgCtx.font = `bold ${bgFontSize}px 'Courier New', monospace`;
    for (let i = 0; i < bgDrops.length; i++) {
      const text = bgLetters.charAt(Math.floor(Math.random() * bgLetters.length));
      bgCtx.fillText(text, i * bgFontSize, bgDrops[i] * bgFontSize);
      if (bgDrops[i] * bgFontSize > bgCanvas.height && Math.random() > 0.975) bgDrops[i] = 0;
      bgDrops[i]++;
    }
    requestAnimationFrame(drawBg);
  }
  drawBg();
  window.addEventListener("resize", () => initBg());

  // TURTLE ENGINE
  const canvas = document.getElementById("turtleCanvas");
  const ctx = canvas.getContext("2d");
  let turtle = { x: 0, y: 0, angle: 0, pen: true };
  const consoleHistory = document.getElementById("consoleHistory");
  const penStatusSpan = document.getElementById("penStatus");
  const desktopCmd = document.getElementById("cmd");
  const mobileCommand = document.getElementById("mobileCommand");
  const mobileSubmit = document.getElementById("mobileSubmit");

  function updatePenIndicator() { penStatusSpan.innerText = turtle.pen ? "DOWN ✍️" : "UP ✏️"; }
  function drawGrid() {
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = "#33ff99";
    ctx.lineWidth = 0.8;
    for (let i = 0; i < canvas.width; i += 40) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }
    ctx.restore();
  }
  function setupStyle() { ctx.lineWidth = 3.5; ctx.strokeStyle = "#33ff99"; ctx.shadowColor = "#33ff99"; ctx.shadowBlur = 4; ctx.lineCap = "round"; }
  function drawTurtle() {
    ctx.save();
    ctx.fillStyle = "#33ff99";
    ctx.strokeStyle = "#ccffcc";
    ctx.lineWidth = 1.8;
    const size = 11;
    const rad = turtle.angle * Math.PI / 180;
    const headX = turtle.x + Math.cos(rad) * size;
    const headY = turtle.y + Math.sin(rad) * size;
    const leftAngle = rad + 2.3;
    const rightAngle = rad - 2.3;
    const leftX = turtle.x + Math.cos(leftAngle) * (size * 0.75);
    const leftY = turtle.y + Math.sin(leftAngle) * (size * 0.75);
    const rightX = turtle.x + Math.cos(rightAngle) * (size * 0.75);
    const rightY = turtle.y + Math.sin(rightAngle) * (size * 0.75);
    ctx.beginPath();
    ctx.moveTo(headX, headY);
    ctx.lineTo(leftX, leftY);
    ctx.lineTo(rightX, rightY);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(turtle.x + Math.cos(rad) * 5.5, turtle.y + Math.sin(rad) * 5.5, 2.2, 0, Math.PI * 2);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(turtle.x + Math.cos(rad) * 6, turtle.y + Math.sin(rad) * 6, 1.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); drawGrid(); setupStyle(); drawTurtle(); }
  function moveTurtle(dist) {
    const rad = turtle.angle * Math.PI / 180;
    const newX = turtle.x + Math.cos(rad) * dist;
    const newY = turtle.y + Math.sin(rad) * dist;
    if (turtle.pen) { ctx.beginPath(); ctx.moveTo(turtle.x, turtle.y); ctx.lineTo(newX, newY); ctx.stroke(); }
    turtle.x = Math.min(Math.max(newX, 5), canvas.width - 5);
    turtle.y = Math.min(Math.max(newY, 5), canvas.height - 5);
    drawTurtle();
  }
  function execCmd(cmd, val) {
    switch(cmd) {
      case "fd": if(val !== null) moveTurtle(val); break;
      case "bk": if(val !== null) moveTurtle(-val); break;
      case "rt": if(val !== null) { turtle.angle += val; drawTurtle(); } break;
      case "lt": if(val !== null) { turtle.angle -= val; drawTurtle(); } break;
      case "pu": turtle.pen = false; updatePenIndicator(); drawTurtle(); break;
      case "pd": turtle.pen = true; updatePenIndicator(); drawTurtle(); break;
      case "home": turtle.x = canvas.width/2; turtle.y = canvas.height/2; turtle.angle = 0; drawTurtle(); break;
      case "clear": clearCanvas(); break;
      default: return false;
    }
    return true;
  }
  function addLine(text) { const div = document.createElement("div"); div.className = "line"; div.textContent = text; consoleHistory.appendChild(div); consoleHistory.scrollTop = consoleHistory.scrollHeight; while(consoleHistory.children.length > 200) consoleHistory.removeChild(consoleHistory.firstChild); }
  function tokenize(input) { return input.replace(/\[/g, ' [ ').replace(/\]/g, ' ] ').trim().split(/\s+/).filter(t => t.length > 0); }
  function interpret(tokens, start=0, end=null) {
    let idx = start;
    const limit = end === null ? tokens.length : end;
    while(idx < limit) {
      const token = tokens[idx];
      if(token === "repeat") {
        if(idx+2 >= limit) { addLine("repeat syntax error"); return idx+1; }
        const count = parseInt(tokens[idx+1],10);
        if(isNaN(count)) { addLine("repeat: invalid number"); return idx+2; }
        if(tokens[idx+2] !== "[") { addLine("repeat: missing '['"); return idx+2; }
        let depth = 1;
        let close = idx+3;
        while(close < limit && depth > 0) {
          if(tokens[close] === "[") depth++;
          if(tokens[close] === "]") depth--;
          close++;
        }
        if(depth !== 0) { addLine("repeat: unmatched brackets"); return close; }
        const block = tokens.slice(idx+3, close-1);
        for(let i=0;i<count;i++) interpret(block,0,block.length);
        idx = close;
        continue;
      }
      const lower = token.toLowerCase();
      if(["fd","bk","rt","lt"].includes(lower)) {
        if(idx+1 >= limit) { addLine(`missing argument for ${token}`); idx++; continue; }
        const arg = parseFloat(tokens[idx+1]);
        if(isNaN(arg)) { addLine(`expected number after ${token}`); idx+=2; continue; }
        execCmd(lower, arg);
        idx+=2;
        continue;
      }
      if(["pu","pd","home","clear"].includes(lower)) { execCmd(lower); idx++; continue; }
      if(token === "]") break;
      addLine(`unknown: ${token}`);
      idx++;
    }
    return idx;
  }
  function runCommand(raw) {
    const trimmed = raw.trim();
    if(trimmed === "") return;
    addLine(`> ${trimmed}`);
    const tokens = tokenize(trimmed);
    if(tokens.length === 0) return;
    try { interpret(tokens); } catch(e) { addLine(`ERROR: ${e.message}`); }
    drawTurtle();
    updatePenIndicator();
  }
  function resizeCanvas() {
    const wrapper = document.querySelector(".canvas-wrapper");
    const rect = wrapper.getBoundingClientRect();
    const oldW = canvas.width;
    const oldH = canvas.height;
    canvas.width = rect.width;
    canvas.height = rect.height;
    if(oldW > 0 && oldH > 0 && turtle.x > 0 && turtle.y > 0) {
      turtle.x = turtle.x * (canvas.width / oldW);
      turtle.y = turtle.y * (canvas.height / oldH);
    } else { turtle.x = canvas.width/2; turtle.y = canvas.height/2; }
    turtle.x = Math.min(Math.max(turtle.x,10), canvas.width-10);
    turtle.y = Math.min(Math.max(turtle.y,10), canvas.height-10);
    clearCanvas();
  }
  window.addEventListener("resize", () => setTimeout(resizeCanvas, 50));
  resizeCanvas();
  updatePenIndicator();
  addLine("🐢 ONN LOGO ENGINE READY");
  addLine("Commands: fd, bk, rt, lt, pu, pd, home, clear, repeat");
  desktopCmd.addEventListener("keydown", (e) => { if(e.key === "Enter") { e.preventDefault(); runCommand(desktopCmd.value); desktopCmd.value = ""; desktopCmd.focus(); } });
  mobileSubmit.addEventListener("click", () => { runCommand(mobileCommand.value); mobileCommand.value = ""; mobileCommand.blur(); });
  mobileCommand.addEventListener("keydown", (e) => { if(e.key === "Enter") { e.preventDefault(); runCommand(mobileCommand.value); mobileCommand.value = ""; mobileCommand.blur(); } });
  document.querySelectorAll(".quick-cmd").forEach(btn => { btn.addEventListener("click", () => { runCommand(btn.dataset.cmd); }); });
</script>
<script src="matrix-nav.js"></script>
</body>
</html>
