<!DOCTYPE html>
<html>
<head>
  <title>ONN LOGO ENGINE</title>
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #33ff99;
      font-family: monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0.15;
    }

    .wrapper {
      display: flex;
      height: 100vh;
      padding: 20px;
      gap: 20px;
      box-sizing: border-box;
      position: relative;
      z-index: 2;
    }

    .left {
      flex: 2;
      display: flex;
      flex-direction: column;
    }

    .console {
      flex: 1;
      border: 1px solid rgba(0,255,100,0.3);
      padding: 15px;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 15px rgba(0,255,100,0.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .line {
      font-size: 13px;
      margin-bottom: 5px;
      white-space: pre-wrap;
    }

    input {
      margin-top: auto;
      padding: 12px;
      background: black;
      border: 1px solid #33ff99;
      color: #33ff99;
      font-family: monospace;
      outline: none;
    }

    .right {
      flex: 1;
      border: 1px solid rgba(0,255,100,0.3);
      padding: 15px;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 15px rgba(0,255,100,0.1);
      overflow-y: auto;
    }

    .hint {
      font-size: 13px;
      margin-bottom: 10px;
      border-left: 2px solid #33ff99;
      padding-left: 8px;
      opacity: 0.85;
    }

    a {
      color: #33ff99;
      text-decoration: none;
      margin-bottom: 10px;
      display: inline-block;
    }

    @media(max-width:800px){
      .wrapper{flex-direction:column;}
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="wrapper">

  <div class="left">
    <a href="toys.html">← BACK</a>
    <h2>> ONN LOGO ENGINE</h2>

    <div class="console" id="console"></div>
    <input id="cmd" placeholder="fd 100 rt 90 repeat 4 [fd 100 rt 90]" autofocus>
  </div>

  <div class="right">
    <div class="hint">fd 100 → forward</div>
    <div class="hint">bk 50 → backward</div>
    <div class="hint">rt 90 → turn right</div>
    <div class="hint">lt 90 → turn left</div>
    <div class="hint">pu / pd → pen up/down</div>
    <div class="hint">home → reset position</div>
    <div class="hint">clear → clear screen</div>
    <div class="hint">repeat 4 [fd 100 rt 90]</div>
  </div>

</div>

<script>
// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// TURTLE
let turtle = {
  x: canvas.width/2,
  y: canvas.height/2,
  angle: 0,
  pen: true
};

ctx.strokeStyle = "#00ff88";
ctx.lineWidth = 2;

// CONSOLE
const input = document.getElementById("cmd");
const consoleBox = document.getElementById("console");

function addLine(text){
  const div = document.createElement("div");
  div.className = "line";
  div.textContent = text;
  consoleBox.appendChild(div);
  consoleBox.scrollTop = consoleBox.scrollHeight;
}

// MOVE
function move(dist){
  const rad = turtle.angle * Math.PI / 180;
  const nx = turtle.x + Math.cos(rad) * dist;
  const ny = turtle.y + Math.sin(rad) * dist;

  if(turtle.pen){
    ctx.beginPath();
    ctx.moveTo(turtle.x, turtle.y);
    ctx.lineTo(nx, ny);
    ctx.stroke();
  }

  turtle.x = nx;
  turtle.y = ny;
}

// COMMAND EXEC
function run(cmd, val){
  switch(cmd){
    case "fd": move(val); break;
    case "bk": move(-val); break;
    case "rt": turtle.angle += val; break;
    case "lt": turtle.angle -= val; break;
    case "pu": turtle.pen = false; break;
    case "pd": turtle.pen = true; break;

    case "home":
      turtle.x = canvas.width/2;
      turtle.y = canvas.height/2;
      turtle.angle = 0;
      break;

    case "clear":
      ctx.clearRect(0,0,canvas.width,canvas.height);
      break;

    default:
      addLine("unknown: " + cmd);
  }
}

// TOKENIZER
function tokenize(str){
  return str
    .replace(/\[/g, " [ ")
    .replace(/\]/g, " ] ")
    .trim()
    .split(/\s+/);
}

// INTERPRETER
function interpret(tokens){

  let i = 0;

  while(i < tokens.length){

    let token = tokens[i];

    if(token === "repeat"){
      let count = parseInt(tokens[i+1]);

      if(tokens[i+2] !== "["){
        addLine("syntax error: missing [");
        return;
      }

      let depth = 1;
      let j = i+3;

      while(j < tokens.length && depth > 0){
        if(tokens[j] === "[") depth++;
        if(tokens[j] === "]") depth--;
        j++;
      }

      let block = tokens.slice(i+3, j-1);

      for(let r=0; r<count; r++){
        interpret(block);
      }

      i = j;
      continue;
    }

    if(["fd","bk","rt","lt"].includes(token)){
      run(token, parseFloat(tokens[i+1]));
      i += 2;
      continue;
    }

    if(["pu","pd","home","clear"].includes(token)){
      run(token);
      i += 1;
      continue;
    }

    addLine("unknown: " + token);
    i++;
  }
}

// INPUT
input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    let val = input.value.toLowerCase().trim();
    addLine("> " + val);

    let tokens = tokenize(val);
    interpret(tokens);

    input.value = "";
  }
});

// BOOT
addLine("ONN LOGO ENGINE READY");
addLine("type commands to draw");
</script>

</body>
</html>
