<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MATRIX DOOM TERMINAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{background:#000;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:monospace;overflow:hidden;position:relative;}
#matrix-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.25;}
.terminal-container{position:relative;z-index:10;width:90%;max-width:800px;background:rgba(0,0,0,.85);border:2px solid #00ff00;border-radius:12px;padding:2rem;box-shadow:0 0 20px rgba(0,255,0,.3);}
.terminal{color:#00ff00;font-size:1.2rem;line-height:1.6;}
.terminal-line{margin-bottom:.5rem;}
.press-enter{margin-top:1.5rem;text-align:center;font-weight:bold;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.doom-wrapper{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;background:#000;display:none;flex-direction:column;justify-content:center;align-items:center;}
canvas{width:100%;max-height:85vh;border:2px solid #00ff00;}
.loading-text{color:#00ff00;margin-top:1rem;}
</style>

</head>

<body>

<canvas id="matrix-bg"></canvas>

<div id="terminalContainer" class="terminal-container">
<div id="terminal" class="terminal"></div>
<div id="enterPrompt" class="press-enter" style="display:none;">[ PRESS ENTER TO JACK IN ]</div>
</div>

<div id="doomWrapper" class="doom-wrapper">
<canvas id="doomCanvas"></canvas>
<div id="loadingProgress" class="loading-text">Initializing DOOM engine...</div>
</div>

<script>
(function(){

const DRIVE_WAD = "https://drive.google.com/uc?export=download&id=1eNV7gy_WhUQHDxFfbofJCF8LZlIZe_Zf";

const terminal=document.getElementById("terminal");
const enter=document.getElementById("enterPrompt");
const wrapper=document.getElementById("doomWrapper");
const container=document.getElementById("terminalContainer");
const progress=document.getElementById("loadingProgress");

const boot=[
"> INITIALIZING ONN TERMINAL...",
"> CONNECTING...",
"> BYPASSING FIREWALL...",
"> ACCESS GRANTED."
];

let i=0;

function typeLine(){
if(i>=boot.length){enter.style.display="block";return;}
let line=document.createElement("div");
terminal.appendChild(line);
let text=boot[i],j=0;

let t=setInterval(()=>{
line.textContent+=text[j++];
if(j>=text.length){clearInterval(t);i++;setTimeout(typeLine,300);}
},25);
}

typeLine();

window.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){start();}
});

enter.onclick=start;

function start(){
container.style.display="none";
wrapper.style.display="flex";
initDoom();
}

function initDoom(){

progress.innerText="Loading DOOM...";

let canvas=document.getElementById("doomCanvas");

window.Module={
canvas:canvas,
arguments:["-iwad",DRIVE_WAD],
print:(t)=>console.log(t),
printErr:(t)=>console.error(t)
};

let script=document.createElement("script");
script.src="doom.js";
document.body.appendChild(script);

}

})();
</script>

</body>
</html>
