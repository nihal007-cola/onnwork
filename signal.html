<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATRIX DOOM TERMINAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#0f0;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}
.terminal{border:2px solid #0f0;padding:20px;width:80%;max-width:700px;}
#enter{margin-top:20px;text-align:center;animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0}}
#doom{display:none;width:100%;height:100vh;}
canvas{width:100%;height:100%;}
</style>

</head>

<body>

<div class="terminal" id="terminal">
<div>> INITIALIZING ONN TERMINAL...</div>
<div>> CONNECTING...</div>
<div>> BYPASSING FIREWALL...</div>
<div>> ACCESS GRANTED.</div>
<div id="enter">[ PRESS ENTER ]</div>
</div>

<div id="doom">
<canvas id="canvas"></canvas>
</div>

<script>

const WAD_URL = "https://cdn.jsdelivr.net/gh/freedoom/freedoom@master/freedoom1.wad";

document.addEventListener("keydown", e => {
if(e.key === "Enter") start();
});

function start(){
document.getElementById("terminal").style.display="none";
document.getElementById("doom").style.display="block";
runDoom();
}

function runDoom(){

window.Module = {
canvas: document.getElementById("canvas"),
arguments: ["-iwad", "freedoom.wad"],

preRun: [function(){
Module.FS_createPreloadedFile("/", "freedoom.wad", WAD_URL, true, false);
}],

print: (t)=>console.log(t),
printErr: (t)=>console.error(t),

setStatus: (t)=>console.log("STATUS:",t)
};

let s=document.createElement("script");
s.src="doom.js";
document.body.appendChild(s);

}

</script>

</body>
</html>
