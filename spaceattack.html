<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SPACE ATTACK · NEON TERMINAL SHOOTER</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at center, #0a0f0a 0%, #000000 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Courier New', monospace;
  padding: 12px;
  overflow-x: hidden;
  position: relative;
}

/* 🔥 BACK BUTTON (DESIGN MATCHED) */
.back-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 999;

  color: #33ff99;
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 1px;

  padding: 6px 14px;
  border: 1px solid #33ff99;
  border-radius: 30px;

  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);

  box-shadow: 0 0 10px rgba(51,255,153,0.3);
  transition: all 0.2s ease;
}

.back-btn:hover {
  background: #33ff99;
  color: black;
  box-shadow: 0 0 18px #33ff99;
  transform: scale(1.05);
}

.back-btn:active {
  transform: scale(0.95);
}

.game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 1000px;
}

canvas {
  display: block;
  box-shadow: 0 0 0 2px #33ff99, 0 0 0 6px rgba(51, 255, 153, 0.2), 0 0 30px rgba(51, 255, 153, 0.4);
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  height: auto;
  background: black;
  touch-action: none;
}

.info-panel {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  background: rgba(0, 0, 0, 0.85);
  border: 1px solid #33ff99;
  padding: 8px 16px;
  border-radius: 40px;
  backdrop-filter: blur(4px);
  font-weight: bold;
  font-size: 12px;
  letter-spacing: 1px;
}

.status {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.status span {
  color: #33ff99;
  text-shadow: 0 0 5px #33ff99;
}

button {
  background: transparent;
  border: 1.5px solid #33ff99;
  color: #33ff99;
  font-family: monospace;
  font-weight: bold;
  font-size: 12px;
  padding: 4px 14px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  background: #33ff99;
  color: black;
  box-shadow: 0 0 12px #33ff99;
}
</style>
</head>

<body>

<!-- 🔥 BACK BUTTON -->
<a href="toys.html" class="back-btn">← BACK</a>

<div class="game-container">
  <canvas id="gameCanvas" width="1000" height="562"></canvas>

  <div class="info-panel">
    <div class="status">
      <span>⚡ SCORE: <span id="scoreValue">0</span></span>
      <span>| LVL: <span id="levelValue">1</span></span>
    </div>
    <button id="pauseBtnDesktop">⏸ PAUSE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let x = 50;
let y = 50;

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#33ff99";
  ctx.fillRect(x,y,20,20);
}

function update() {
  x += 1;
  if(x > canvas.width) x = 0;
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

// ESC also goes back
window.addEventListener('keydown', (e)=>{
  if(e.code === 'Escape'){
    window.location.href = "toys.html";
  }
});
</script>

</body>
</html>
