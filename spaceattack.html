<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SPACE ATTACK · ARCADE SHOOTER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { background: black; color: #33ff99; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    canvas#matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.35; pointer-events: none; }
    .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid #33ff99; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .logo { height: 35px; width: auto; }
    .nav-links { display: flex; gap: 12px; }
    .nav-link { color: #33ff99; text-decoration: none; font-size: 13px; font-family: monospace; border: 1px solid #33ff99; padding: 4px 12px; border-radius: 20px; transition: all 0.2s ease; }
    .nav-link:hover { background: #33ff99; color: black; box-shadow: 0 0 10px #33ff99; }
    .header-right { display: flex; gap: 12px; }
    .contact-icon { color: #33ff99; text-decoration: none; font-size: 18px; padding: 4px 10px; border: 1px solid #33ff99; border-radius: 30px; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 5px; }
    .contact-icon span { font-size: 11px; }
    .contact-icon:hover { background: #33ff99; color: black; box-shadow: 0 0 10px #33ff99; }
    .game-container { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 10px; }
    canvas#gameCanvas { display: block; box-shadow: 0 0 0 2px #33ff99, 0 0 20px rgba(51,255,153,0.3); border-radius: 8px; background: black; max-width: 100%; height: auto; cursor: none; }
    .info-bar { display: flex; justify-content: space-between; width: 100%; max-width: 1000px; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
    .info-panel { display: flex; gap: 20px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 30px; border: 1px solid #33ff99; }
    .info-panel span { font-size: 12px; }
    button { background: transparent; border: 1.5px solid #33ff99; color: #33ff99; font-family: monospace; font-size: 12px; padding: 4px 14px; border-radius: 30px; cursor: pointer; transition: 0.2s; }
    button:hover { background: #33ff99; color: black; box-shadow: 0 0 10px #33ff99; }
    .touch-controls { display: none; margin-top: 10px; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .touch-btn { background: rgba(0,0,0,0.8); border: 2px solid #33ff99; color: #33ff99; font-size: 20px; padding: 10px 20px; border-radius: 16px; min-width: 70px; text-align: center; cursor: pointer; touch-action: manipulation; }
    .touch-btn:active { background: #33ff99; color: black; transform: scale(0.95); }
    @media (max-width: 700px) {
      .sticky-header { flex-direction: column; text-align: center; }
      .contact-icon span { display: none; }
      .info-panel { gap: 10px; flex-wrap: wrap; justify-content: center; }
      .touch-controls { display: flex; }
    }
  </style>
</head>
<body>
<canvas id="matrix-bg"></canvas>
<div class="sticky-header">
  <div class="header-left">
    <img src="logo.png" class="logo" alt="ONN Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'black\'/%3E%3Ctext x=\'50\' y=\'68\' font-size=\'48\' text-anchor=\'middle\' fill=\'%2333ff99\'%3EONN%3C/text%3E%3C/svg%3E'">
    <div class="nav-links">
      <a href="index.html" class="nav-link">HOME</a>
      <a href="toys.html" class="nav-link">← TOYS</a>
    </div>
  </div>
  <div class="header-right">
    <a href="https://wa.me/917044358282" target="_blank" class="contact-icon">💬 <span>CHAT</span></a>
    <a href="tel:+917044358282" class="contact-icon">📞 <span>CALL</span></a>
    <a href="mailto:onn@jamesmoriarty.in" class="contact-icon">✉️ <span>MAIL</span></a>
  </div>
</div>
<div class="game-container">
  <div class="info-bar">
    <div class="info-panel"><span>💥 SCORE: <span id="scoreVal">0</span></span><span>⭐ LEVEL: <span id="levelVal">1</span></span><span>❤️ HEALTH: <span id="healthVal">100</span></span></div>
    <div class="info-panel"><span>🔴 R:<span id="rapidCount">0</span></span><span>🔵 S:<span id="shieldCount">0</span></span><span>🟣 D:<span id="doubleCount">0</span></span></div>
    <button id="pauseBtn">⏸ PAUSE</button>
  </div>
  <canvas id="gameCanvas" width="900" height="500"></canvas>
  <div class="touch-controls" id="touchControls">
    <button class="touch-btn" data-action="left">◀</button>
    <button class="touch-btn" data-action="right">▶</button>
    <button class="touch-btn" data-action="up">▲</button>
    <button class="touch-btn" data-action="down">▼</button>
    <button class="touch-btn" data-action="fire">🔫 FIRE</button>
    <button class="touch-btn" data-action="pause">⏸</button>
    <button class="touch-btn" data-action="rapid">⚡R</button>
    <button class="touch-btn" data-action="shield">🛡️S</button>
    <button class="touch-btn" data-action="double">💥D</button>
  </div>
</div>
<script>
  // MATRIX BG
  const bgCanvas = document.getElementById("matrix-bg");
  const bgCtx = bgCanvas.getContext("2d");
  function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
  resizeBg();
  window.addEventListener("resize", resizeBg);
  const bgLetters = "01ONNWORKLAB";
  const bgFontSize = 14;
  let bgColumns = Math.floor(bgCanvas.width / bgFontSize);
  let bgDrops = [];
  function initBg() {
    bgColumns = Math.floor(bgCanvas.width / bgFontSize);
    bgDrops = [];
    for (let x = 0; x < bgColumns; x++) bgDrops[x] = Math.random() * -100;
  }
  initBg();
  function drawBg() {
    bgCtx.fillStyle = "rgba(0, 0, 0, 0.04)";
    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
    bgCtx.fillStyle = "#33ff99";
    bgCtx.font = `bold ${bgFontSize}px 'Courier New', monospace`;
    for (let i = 0; i < bgDrops.length; i++) {
      const text = bgLetters.charAt(Math.floor(Math.random() * bgLetters.length));
      bgCtx.fillText(text, i * bgFontSize, bgDrops[i] * bgFontSize);
      if (bgDrops[i] * bgFontSize > bgCanvas.height && Math.random() > 0.975) bgDrops[i] = 0;
      bgDrops[i]++;
    }
    requestAnimationFrame(drawBg);
  }
  drawBg();
  window.addEventListener("resize", () => initBg());

  // GAME
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const W = 900, H = 500;
  canvas.width = W; canvas.height = H;
  
  let gameRunning = false, paused = false, gameOverFlag = false;
  let score = 0, level = 1, enemiesKilled = 0, levelThreshold = 8;
  let player = { x: 80, y: H/2, width: 18, height: 18, health: 100, maxHealth: 100, invincible: 0, rapidFire: 0, doubleDamage: 0, shield: 0 };
  let inventory = { rapid: 0, shield: 0, double: 0 };
  let bullets = [], enemyBullets = [], enemies = [], powerups = [];
  let shootCd = 0, spawnCd = 0;
  let keys = { left: false, right: false, up: false, down: false, fire: false };
  
  const scoreSpan = document.getElementById("scoreVal"), levelSpan = document.getElementById("levelVal"), healthSpan = document.getElementById("healthVal");
  const rapidSpan = document.getElementById("rapidCount"), shieldSpan = document.getElementById("shieldCount"), doubleSpan = document.getElementById("doubleCount");
  
  function updateUI() { scoreSpan.innerText = score; levelSpan.innerText = level; healthSpan.innerText = player.health; rapidSpan.innerText = inventory.rapid; shieldSpan.innerText = inventory.shield; doubleSpan.innerText = inventory.double; }
  
  function spawnEnemy() {
    let type = "basic";
    let r = Math.random();
    if(level>=2 && r<0.2) type="fast";
    else if(level>=3 && r<0.35) type="shooter";
    else if(level>=4 && r<0.5) type="tank";
    let y = 30 + Math.random() * (H-80);
    let enemy = { x: W+20, y: y, type: type, health: type==="tank"?4:type==="shooter"?2:1, speed: type==="fast"?3.2:type==="tank"?1.0:1.6, shootCd: 0, score: type==="tank"?40:type==="shooter"?25:type==="fast"?15:10 };
    if(type==="tank") enemy.w=32, enemy.h=28;
    else if(type==="shooter") enemy.w=26, enemy.h=22;
    else if(type==="fast") enemy.w=18, enemy.h=14;
    else enemy.w=24, enemy.h=18;
    enemies.push(enemy);
  }
  
  function shoot() { bullets.push({ x: player.x+12, y: player.y-3, w: 8, h: 4, dmg: player.doubleDamage>0?2:1 }); bullets.push({ x: player.x+12, y: player.y+3, w: 8, h: 4, dmg: player.doubleDamage>0?2:1 }); }
  
  function update() {
    if(!gameRunning || paused) return;
    if(shootCd>0) shootCd--;
    if(player.invincible>0) player.invincible--;
    if(player.rapidFire>0) { player.rapidFire--; if(player.rapidFire<=0) {} }
    if(player.doubleDamage>0) player.doubleDamage--;
    if(player.shield>0) player.shield--;
    
    let moveX=0, moveY=0;
    if(keys.left) moveX=-1;
    if(keys.right) moveX=1;
    if(keys.up) moveY=-1;
    if(keys.down) moveY=1;
    player.x += moveX * 5.5;
    player.y += moveY * 5.5;
    player.x = Math.min(Math.max(player.x, 30), W-50);
    player.y = Math.min(Math.max(player.y, 25), H-25);
    
    if(keys.fire && shootCd===0) { shoot(); shootCd = player.rapidFire>0?4:12; }
    
    for(let i=0;i<bullets.length;i++) { bullets[i].x += 7; if(bullets[i].x > W) bullets.splice(i,1), i--; }
    for(let i=0;i<enemyBullets.length;i++) { enemyBullets[i].x -= 4; if(enemyBullets[i].x+6<0) enemyBullets.splice(i,1), i--; }
    
    if(spawnCd<=0) { spawnEnemy(); if(Math.random()<0.3) spawnEnemy(); spawnCd = Math.max(20, 45 - Math.floor(level*2)); } else spawnCd--;
    
    for(let e of enemies) {
      e.x -= e.speed;
      if(e.type==="shooter") { if(e.shootCd<=0) { enemyBullets.push({ x: e.x-5, y: e.y+e.h/2-3, w:6, h:4 }); e.shootCd=45; } else e.shootCd--; }
      if(e.x + e.w < 0) { let idx = enemies.indexOf(e); enemies.splice(idx,1); }
      if(Math.abs(e.x - player.x) < 25 && Math.abs(e.y - player.y) < 25) {
        if(player.shield<=0) player.health = Math.max(0, player.health-20);
        player.invincible = 25;
        let idx = enemies.indexOf(e); enemies.splice(idx,1);
        if(player.health<=0) gameRunning=false, gameOverFlag=true;
      }
    }
    
    for(let b of enemyBullets) {
      if(Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 15) {
        if(player.shield<=0) player.health = Math.max(0, player.health-10);
        player.invincible = 25;
        let idx = enemyBullets.indexOf(b); enemyBullets.splice(idx,1);
        if(player.health<=0) gameRunning=false, gameOverFlag=true;
      }
    }
    
    for(let i=0;i<bullets.length;i++) {
      for(let j=0;j<enemies.length;j++) {
        let b=bullets[i], e=enemies[j];
        if(b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y) {
          e.health -= b.dmg;
          bullets.splice(i,1); i--;
          if(e.health<=0) {
            score += e.score;
            enemiesKilled++;
            if(Math.random()<0.2) powerups.push({ x: e.x+e.w/2, y: e.y+e.h/2, type: ["rapid","shield","double"][Math.floor(Math.random()*3)] });
            enemies.splice(j,1);
            if(enemiesKilled >= levelThreshold) { level++; levelThreshold = Math.floor(levelThreshold+7+level*0.5); enemiesKilled=0; updateUI(); }
            updateUI();
          }
          break;
        }
      }
    }
    
    for(let i=0;i<powerups.length;i++) {
      let p=powerups[i];
      if(Math.abs(p.x-player.x)<20 && Math.abs(p.y-player.y)<20) {
        inventory[p.type]++; updateUI();
        powerups.splice(i,1); i--;
      }
    }
    updateUI();
  }
  
  function draw() {
    ctx.fillStyle = "black"; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = "#33ff99"; ctx.lineWidth=0.5; ctx.globalAlpha=0.2;
    for(let i=0;i<W;i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i%H); ctx.lineTo(W,i%H); ctx.stroke(); }
    ctx.globalAlpha=1;
    ctx.fillStyle="#33ff99"; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(player.x+12,player.y); ctx.lineTo(player.x-4,player.y-10); ctx.lineTo(player.x-2,player.y-3); ctx.lineTo(player.x-10,player.y-3); ctx.lineTo(player.x-10,player.y+3); ctx.lineTo(player.x-2,player.y+3); ctx.lineTo(player.x-4,player.y+10); ctx.fill();
    if(player.shield>0) { ctx.strokeStyle="#88ffcc"; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(player.x+2,player.y,18,0,Math.PI*2); ctx.stroke(); }
    
    for(let e of enemies) {
      ctx.fillStyle="#33ff99"; ctx.fillRect(e.x,e.y,e.w,e.h);
      if(e.type==="tank") { ctx.fillStyle="#88ffaa"; for(let i=0;i<e.health;i++) ctx.fillRect(e.x+4+i*6,e.y-6,4,4); }
      if(e.type==="shooter") { ctx.fillStyle="#88ffaa"; ctx.beginPath(); ctx.ellipse(e.x+5,e.y+e.h/2,5,8,0,0,Math.PI*2); ctx.fill(); }
    }
    for(let b of bullets) { ctx.fillStyle="#ffff88"; ctx.fillRect(b.x,b.y,8,4); }
    for(let b of enemyBullets) { ctx.fillStyle="#ffaa66"; ctx.fillRect(b.x,b.y,6,4); }
    for(let p of powerups) { ctx.fillStyle="#ff66cc"; ctx.fillRect(p.x,p.y,14,14); ctx.fillStyle="white"; ctx.font="bold 12px monospace"; ctx.fillText(p.type[0].toUpperCase(), p.x+4, p.y+11); }
    
    ctx.fillStyle="#33ff99"; ctx.font="bold 12px monospace"; ctx.fillText(`HEALTH ${player.health}`, 15, 25);
    if(!gameRunning && !gameOverFlag) { ctx.font="bold 24px monospace"; ctx.textAlign="center"; ctx.fillText("⚡ SPACE ATTACK ⚡", W/2, H/2-40); ctx.font="12px monospace"; ctx.fillText("PRESS ANY KEY OR TAP TO START", W/2, H/2+20); ctx.textAlign="left"; }
    if(gameOverFlag) { ctx.font="bold 28px monospace"; ctx.textAlign="center"; ctx.fillText("☠️ GAME OVER ☠️", W/2, H/2); ctx.font="14px monospace"; ctx.fillText(`FINAL SCORE: ${score}`, W/2, H/2+40); ctx.fillText("PRESS ANY KEY TO RESTART", W/2, H/2+80); ctx.textAlign="left"; }
    if(paused && gameRunning) { ctx.fillStyle="rgba(0,0,0,0.8)"; ctx.fillRect(0,0,W,H); ctx.fillStyle="#33ff99"; ctx.font="bold 28px monospace"; ctx.textAlign="center"; ctx.fillText("⏸ PAUSED", W/2, H/2); ctx.textAlign="left"; }
    ctx.shadowBlur=0;
  }
  
  function reset() { score=0; level=1; enemiesKilled=0; levelThreshold=8; player.health=100; player.invincible=0; player.rapidFire=0; player.doubleDamage=0; player.shield=0; inventory={rapid:0,shield:0,double:0}; bullets=[]; enemyBullets=[]; enemies=[]; powerups=[]; shootCd=0; spawnCd=0; gameOverFlag=false; paused=false; gameRunning=true; updateUI(); }
  
  function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
  
  window.addEventListener("keydown", (e) => {
    if(!gameRunning && !gameOverFlag) reset();
    if(gameOverFlag) reset();
    if(e.code==="ArrowLeft") keys.left=true;
    if(e.code==="ArrowRight") keys.right=true;
    if(e.code==="ArrowUp") keys.up=true;
    if(e.code==="ArrowDown") keys.down=true;
    if(e.code==="Space") { e.preventDefault(); keys.fire=true; }
    if(e.code==="KeyP") { if(gameRunning && !gameOverFlag) paused=!paused; }
    if(e.code==="KeyR") { if(gameRunning && !paused && !gameOverFlag && inventory.rapid>0) { inventory.rapid--; player.rapidFire=600; updateUI(); } }
    if(e.code==="KeyS") { if(gameRunning && !paused && !gameOverFlag && inventory.shield>0) { inventory.shield--; player.shield=500; updateUI(); } }
    if(e.code==="KeyD") { if(gameRunning && !paused && !gameOverFlag && inventory.double>0) { inventory.double--; player.doubleDamage=450; updateUI(); } }
  });
  window.addEventListener("keyup", (e) => {
    if(e.code==="ArrowLeft") keys.left=false;
    if(e.code==="ArrowRight") keys.right=false;
    if(e.code==="ArrowUp") keys.up=false;
    if(e.code==="ArrowDown") keys.down=false;
    if(e.code==="Space") keys.fire=false;
  });
  
  document.querySelectorAll(".touch-btn").forEach(btn => {
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); let a=btn.dataset.action;
      if(a==="left") keys.left=true; if(a==="right") keys.right=true; if(a==="up") keys.up=true; if(a==="down") keys.down=true;
      if(a==="fire") keys.fire=true;
      if(a==="pause") { if(gameRunning && !gameOverFlag) paused=!paused; }
      if(a==="rapid" && gameRunning && !paused && !gameOverFlag && inventory.rapid>0) { inventory.rapid--; player.rapidFire=600; updateUI(); }
      if(a==="shield" && gameRunning && !paused && !gameOverFlag && inventory.shield>0) { inventory.shield--; player.shield=500; updateUI(); }
      if(a==="double" && gameRunning && !paused && !gameOverFlag && inventory.double>0) { inventory.double--; player.doubleDamage=450; updateUI(); }
      if(!gameRunning && !gameOverFlag) reset();
      if(gameOverFlag) reset();
    });
    btn.addEventListener("touchend", (e) => { let a=btn.dataset.action;
      if(a==="left") keys.left=false; if(a==="right") keys.right=false; if(a==="up") keys.up=false; if(a==="down") keys.down=false;
      if(a==="fire") keys.fire=false;
    });
    btn.addEventListener("mousedown", (e) => { let a=btn.dataset.action;
      if(a==="left") keys.left=true; if(a==="right") keys.right=true; if(a==="up") keys.up=true; if(a==="down") keys.down=true;
      if(a==="fire") keys.fire=true;
      if(a==="pause") { if(gameRunning && !gameOverFlag) paused=!paused; }
      if(a==="rapid" && gameRunning && !paused && !gameOverFlag && inventory.rapid>0) { inventory.rapid--; player.rapidFire=600; updateUI(); }
      if(a==="shield" && gameRunning && !paused && !gameOverFlag && inventory.shield>0) { inventory.shield--; player.shield=500; updateUI(); }
      if(a==="double" && gameRunning && !paused && !gameOverFlag && inventory.double>0) { inventory.double--; player.doubleDamage=450; updateUI(); }
      if(!gameRunning && !gameOverFlag) reset();
      if(gameOverFlag) reset();
    });
    btn.addEventListener("mouseup", (e) => { let a=btn.dataset.action;
      if(a==="left") keys.left=false; if(a==="right") keys.right=false; if(a==="up") keys.up=false; if(a==="down") keys.down=false;
      if(a==="fire") keys.fire=false;
    });
  });
  
  document.getElementById("pauseBtn").addEventListener("click", () => { if(gameRunning && !gameOverFlag) paused=!paused; });
  
  gameRunning = false;
  gameLoop();
</script>
<script src="matrix-nav.js"></script>
</body>
</html>
