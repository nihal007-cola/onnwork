<!DOCTYPE html>
<html>
<head>
  <title>SNAKE</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #33ff99;
      font-family: monospace;
      padding: 20px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    canvas.bg {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0.12;
    }

    h2 {
      position: relative;
      z-index: 2;
    }

    #gameCanvas {
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(0,255,100,0.3);
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    a {
      color: #33ff99;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    #transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #transition.active {
      opacity: 1;
    }
  </style>
</head>

<body>

<canvas id="matrix" class="bg"></canvas>

<a href="toys.html">← BACK</a>

<h2>> SNAKE</h2>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div id="transition"></div>

<script>
// MATRIX BACKGROUND
const bg = document.getElementById("matrix");
const bgCtx = bg.getContext("2d");

function resizeBG() {
  bg.height = window.innerHeight;
  bg.width = window.innerWidth;
}
resizeBG();
window.addEventListener("resize", resizeBG);

const letters = "01";
const fontSize = 14;
let columns = Math.floor(bg.width / fontSize);
let drops = [];

for (let x = 0; x < columns; x++) {
  drops[x] = Math.random() * bg.height;
}

function drawMatrix() {
  bgCtx.fillStyle = "rgba(0,0,0,0.07)";
  bgCtx.fillRect(0, 0, bg.width, bg.height);

  bgCtx.fillStyle = "#00ff88";
  bgCtx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    bgCtx.fillText(text, i * fontSize, drops[i]);

    if (drops[i] > bg.height && Math.random() > 0.98) {
      drops[i] = 0;
    }
    drops[i] += 0.6;
  }
}

setInterval(drawMatrix, 60);


// SNAKE GAME (MIT STYLE SIMPLE IMPLEMENTATION)
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let snake = [{x: 200, y: 200}];
let dx = 20;
let dy = 0;
let food = randomFood();
let score = 0;

function randomFood() {
  return {
    x: Math.floor(Math.random() * 20) * 20,
    y: Math.floor(Math.random() * 20) * 20
  };
}

function drawGame() {
  ctx.fillStyle = "rgba(0,0,0,0.8)";
  ctx.fillRect(0, 0, 400, 400);

  // snake
  ctx.fillStyle = "#33ff99";
  snake.forEach(part => ctx.fillRect(part.x, part.y, 18, 18));

  // food
  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(food.x, food.y, 18, 18);

  // move
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};
  snake.unshift(head);

  // eat
  if (head.x === food.x && head.y === food.y) {
    score++;
    food = randomFood();
  } else {
    snake.pop();
  }

  // collision
  if (
    head.x < 0 || head.y < 0 ||
    head.x >= 400 || head.y >= 400 ||
    snake.slice(1).some(p => p.x === head.x && p.y === head.y)
  ) {
    alert("Game Over | Score: " + score);
    document.location.reload();
  }
}

setInterval(drawGame, 120);


// CONTROLS
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && dy === 0) {
    dx = 0; dy = -20;
  }
  if (e.key === "ArrowDown" && dy === 0) {
    dx = 0; dy = 20;
  }
  if (e.key === "ArrowLeft" && dx === 0) {
    dx = -20; dy = 0;
  }
  if (e.key === "ArrowRight" && dx === 0) {
    dx = 20; dy = 0;
  }
});


// PAGE TRANSITION
const links = document.querySelectorAll("a");

links.forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    const overlay = document.getElementById("transition");
    overlay.classList.add("active");

    setTimeout(() => {
      window.location.href = this.href;
    }, 300);
  });
});
</script>

</body>
</html>
